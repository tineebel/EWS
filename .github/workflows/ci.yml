name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: ${{ secrets.CI_SQL_PASSWORD || 'Ews_CI_Strong_Passw0rd!' }}
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${{ secrets.CI_SQL_PASSWORD || 'Ews_CI_Strong_Passw0rd!' }}' -C -Q 'SELECT 1' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

    env:
      EWS_TEST_CONNECTION_STRING: Server=localhost,1433;Database=master;User Id=sa;Password=${{ secrets.CI_SQL_PASSWORD || 'Ews_CI_Strong_Passw0rd!' }};Encrypt=False;TrustServerCertificate=True;

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore EWS.sln

      - name: Build
        run: dotnet build EWS.sln --no-restore --configuration Release -m:1 -nr:false

      - name: Test
        run: dotnet test EWS.sln --no-build --configuration Release --logger trx -m:1 -nr:false
